name: CI

on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install + lint/test/build (Frontend + Backend if present)
        run: |
          set -e
          node -v
          npm -v
          for d in Backend Frontend; do
            if [ -f "$d/package.json" ]; then
              echo "== $d =="
              cd "$d"
              npm install
              npm run lint --if-present
              npm run test --if-present
              npm run build --if-present
              cd ..
            else
              echo "Skipping $d (no package.json yet)"
            fi
          done
